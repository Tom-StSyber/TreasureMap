<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4a7ab8"/>
      <stop offset="100%" stop-color="#0c3060"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a3060"/>
      <stop offset="100%" stop-color="#0a1830"/>
    </linearGradient>
  </defs>
  <!-- Bezel drop-shadow -->
  <rect x="9" y="9" width="48" height="36" rx="4" fill="black" opacity="0.3"/>
  <!-- Monitor bezel -->
  <rect x="8" y="8" width="48" height="36" rx="4" fill="url(#bezel)" stroke="#051840" stroke-width="1.5"/>
  <!-- Bezel top highlight -->
  <rect x="8" y="8" width="48" height="5" rx="4" fill="white" opacity="0.22"/>
  <!-- Screen -->
  <rect x="13" y="13" width="38" height="25" rx="2" fill="url(#screen)" stroke="#2050a0" stroke-width="1"/>
  <!-- Screen title bar -->
  <rect x="13" y="13" width="38" height="5" rx="2" fill="#1a5a90" opacity="0.9"/>
  <!-- Window content lines -->
  <line x1="16" y1="23" x2="42" y2="23" stroke="#6ec0ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="28" x2="46" y2="28" stroke="#6ec0ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="33" x2="36" y2="33" stroke="#6ec0ff" stroke-width="1.5" opacity="0.5"/>
  <!-- Power LED -->
  <circle cx="53" cy="40" r="2" fill="#00e676" opacity="0.85"/>
  <!-- Stand neck -->
  <rect x="28" y="44" width="8" height="7" rx="1" fill="#1a4070" stroke="#0a2550" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="18" y="51" width="28" height="5" rx="2" fill="#1a4070" stroke="#0a2550" stroke-width="1.5"/>
  <rect x="18" y="51" width="28" height="2" rx="2" fill="white" opacity="0.15"/>
</svg>
