<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shield" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#5090d8"/>
      <stop offset="100%" stop-color="#0c2c60"/>
    </linearGradient>
  </defs>
  <!-- Shield drop-shadow -->
  <path d="M33 9 L54 20 L54 38 Q54 56 33 63 Q13 56 12 38 L12 20 Z"
        fill="black" opacity="0.3"/>
  <!-- Shield body -->
  <path d="M32 8 L53 19 L53 37 Q53 54 32 62 Q11 54 11 37 L11 19 Z"
        fill="url(#shield)" stroke="#081e55" stroke-width="2" stroke-linejoin="round"/>
  <!-- Left facet highlight (3D) -->
  <path d="M11 19 L32 8 L32 15 L16 23 Z" fill="white" opacity="0.22"/>
  <!-- Inner ring -->
  <path d="M32 15 L47 23 L47 36 Q47 49 32 56 Q17 49 17 36 L17 23 Z"
        fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" opacity="0.35"/>
  <!-- Lock shackle -->
  <path d="M25 37 Q25 29 32 29 Q39 29 39 37"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lock body -->
  <rect x="22" y="37" width="20" height="14" rx="2.5" fill="white" opacity="0.88"/>
  <!-- Keyhole -->
  <circle cx="32" cy="42" r="3" fill="#1a4080"/>
  <rect x="30.5" y="44" width="3" height="5" rx="1" fill="#1a4080"/>
</svg>
