<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="disc" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#6dcff5"/>
      <stop offset="50%"  stop-color="#1475c4"/>
      <stop offset="100%" stop-color="#062a7a"/>
    </radialGradient>
  </defs>
  <!-- Arrow shafts -->
  <line x1="32" y1="18" x2="32" y2="7"  stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="57" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="32" x2="7"  y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="57" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrowheads -->
  <polygon points="32,2  28,10 36,10" fill="white"/>
  <polygon points="32,62 28,54 36,54" fill="white"/>
  <polygon points="2,32  10,28 10,36" fill="white"/>
  <polygon points="62,32 54,28 54,36" fill="white"/>
