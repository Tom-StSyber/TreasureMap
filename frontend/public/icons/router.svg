  <circle cx="33.5" cy="33.5" r="14" fill="black" opacity="0.35"/>
  <!-- Disc body -->
  <circle cx="32" cy="32" r="14" fill="url(#disc)" stroke="#05225e" stroke-width="1.5"/>
  <!-- Specular highlight arc (top-left) -->
  <path d="M21 25 Q25 17 36 22" stroke="#a8dcff" stroke-width="2.5" fill="none"
