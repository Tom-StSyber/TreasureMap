version 17.09.04a
!
! Cisco IOS Software, Catalyst 9300-24P — Management and DMZ Switch
! hostname: access-sw-03
!
hostname access-sw-03
!
ip domain-name corp.local
!
enable secret 9 $9$synthlab$hashonly
!
aaa new-model
aaa authentication login default local
!
username admin privilege 15 secret 9 $9$synthlab$hashonly
!
spanning-tree mode rapid-pvst
spanning-tree extend system-id
spanning-tree portfast bpduguard default
!
! ── Uplink trunks to distribution (LACP) ──────────────────────────────────
!
interface GigabitEthernet1/1/1
 description UPLINK-LACP-TO-DIST-SW-01
 switchport mode trunk
 switchport trunk allowed vlan 30,99
 switchport trunk native vlan 99
 channel-group 30 mode active
 no shutdown
!
interface GigabitEthernet1/1/2
 description UPLINK-LACP-TO-DIST-SW-02
 switchport mode trunk
 switchport trunk allowed vlan 30,99
 switchport trunk native vlan 99
 channel-group 30 mode passive
 no shutdown
!
interface Port-channel30
 description UPLINK-VPC-LACP-TO-DISTRIBUTION
 switchport mode trunk
 switchport trunk allowed vlan 30,99
 switchport trunk native vlan 99
 no shutdown
!
! ── VLAN 30 — Windows Management Servers ─────────────────────────────────
! Active Directory Domain Controllers, WSUS, SCCM/Intune
!
interface GigabitEthernet1/0/1
 description DC-01-WIN2022-AD-DNS-10.0.0.100
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet1/0/2
 description DC-02-WIN2022-AD-DNS-10.0.0.101
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet1/0/3
 description WSUS-SRV-01-WIN2022-10.0.0.102
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 no shutdown
!
! ── VLAN 30 — Linux Management Servers ───────────────────────────────────
! Syslog aggregator (ELK stack), NTP server
!
interface GigabitEthernet1/0/4
 description SYSLOG-SRV-01-UBUNTU2204-10.0.0.103
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet1/0/5
 description NTP-SRV-01-CENTOS8-10.0.0.104
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet1/0/6
 description ANSIBLE-CTL-01-UBUNTU2204-10.0.0.105
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet1/0/7
 description BACKUP-SRV-01-WIN2022-10.0.0.106
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet1/0/8
 description SPARE-MGMT
 switchport mode access
 switchport access vlan 30
 shutdown
!
! ── Management SVI ────────────────────────────────────────────────────────
!
interface Vlan30
 description MANAGEMENT-VLAN-SWITCH-MGMT
 ip address 10.0.0.112 255.255.255.224
 no shutdown
!
ip default-gateway 10.0.0.97
!
! ── DHCP snooping / ARP inspection ───────────────────────────────────────
!
ip dhcp snooping
ip dhcp snooping vlan 30
no ip dhcp snooping information option
!
ip arp inspection vlan 30
!
! ── Services ──────────────────────────────────────────────────────────────
!
ntp server 10.0.0.104
snmp-server community corp-ro RO
snmp-server host 10.0.0.103 version 2c corp-ro
logging host 10.0.0.103
!
ip ssh version 2
!
line con 0
 logging synchronous
line vty 0 4
 transport input ssh
 access-class VTY-ACCESS in
!
ip access-list standard VTY-ACCESS
 10 permit 10.0.0.96 0.0.0.31
 20 deny   any log
!
end
