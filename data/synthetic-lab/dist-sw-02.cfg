!Command: show running-config
!Running configuration last done at: Sun Jun 14 00:00:01 2026

version 10.2(5)M
boot nxos bootflash:///nxos64-cs.10.2.5.M.bin
!
hostname dist-sw-02
!
feature ospf
feature bgp
feature hsrp
feature lacp
feature vpc
feature lldp
!
username admin password 5 $5$synthlab$hashonly role network-admin
!
! ── VLANs ─────────────────────────────────────────────────────────────────
!
vlan 1
  name DEFAULT-NATIVE
vlan 10
  name WEB-SERVERS-LINUX
vlan 20
  name APP-DB-SERVERS
vlan 30
  name MANAGEMENT-WINDOWS
vlan 40
  name WORKSTATIONS-WINDOWS
vlan 50
  name GUEST-WIFI
vlan 99
  name OOB-MANAGEMENT
!
spanning-tree mode rapid-pvst
spanning-tree vlan 10,20,30,40,50,99 priority 8192
!
! ── VPC domain ────────────────────────────────────────────────────────────
!
vpc domain 1
  peer-keepalive destination 10.0.0.203 source 10.0.0.204
!
! ── Port-channels ─────────────────────────────────────────────────────────
!
interface port-channel1
  description VPC-PEER-LINK-TO-DIST-SW-01
  switchport mode trunk
  switchport trunk allowed vlan 10,20,30,40,50,99
  vpc peer-link
  no shutdown
!
interface port-channel10
  description DOWNLINK-TO-ACCESS-SW-01-SERVERS
  switchport mode trunk
  switchport trunk allowed vlan 10,20
  vpc 10
  no shutdown
!
interface port-channel20
  description DOWNLINK-TO-ACCESS-SW-02-WORKSTATIONS
  switchport mode trunk
  switchport trunk allowed vlan 40,50
  vpc 20
  no shutdown
!
interface port-channel30
  description DOWNLINK-TO-ACCESS-SW-03-MANAGEMENT
  switchport mode trunk
  switchport trunk allowed vlan 30,99
  vpc 30
  no shutdown
!
! ── Physical uplinks ──────────────────────────────────────────────────────
!
interface Ethernet1/1
  description UPLINK-TO-CORP-RTR-01
  no switchport
  ip address 10.0.0.14 255.255.255.252
  ip ospf authentication message-digest
  ip ospf message-digest-key 1 md5 0spfK3y!
  ip router ospf 1 area 0.0.0.0
  no shutdown
!
interface Ethernet1/2
  description UPLINK-TO-CORP-RTR-02
  no switchport
  ip address 10.0.0.22 255.255.255.252
  ip ospf authentication message-digest
  ip ospf message-digest-key 1 md5 0spfK3y!
  ip router ospf 1 area 0.0.0.0
  no shutdown
!
interface Ethernet1/3
  description VPC-PEER-LINK-MEMBER-1
  switchport mode trunk
  switchport trunk allowed vlan 10,20,30,40,50,99
  channel-group 1 mode active
  no shutdown
!
interface Ethernet1/4
  description VPC-PEER-LINK-MEMBER-2
  switchport mode trunk
  switchport trunk allowed vlan 10,20,30,40,50,99
  channel-group 1 mode active
  no shutdown
