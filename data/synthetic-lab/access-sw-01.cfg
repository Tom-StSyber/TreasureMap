version 17.09.04a
!
! Cisco IOS Software, Catalyst 9300-48P — Server Access Switch
! hostname: access-sw-01
!
hostname access-sw-01
!
ip domain-name corp.local
!
enable secret 9 $9$synthlab$hashonly
!
aaa new-model
aaa authentication login default local
!
username admin privilege 15 secret 9 $9$synthlab$hashonly
!
spanning-tree mode rapid-pvst
spanning-tree extend system-id
spanning-tree portfast default
spanning-tree portfast bpduguard default
!
! ── Uplink trunks to distribution (LACP) ──────────────────────────────────
!
interface GigabitEthernet1/1/1
 description UPLINK-LACP-TO-DIST-SW-01
 switchport mode trunk
 switchport trunk allowed vlan 10,20
 switchport trunk native vlan 99
 channel-group 10 mode active
 no shutdown
!
interface GigabitEthernet1/1/2
 description UPLINK-LACP-TO-DIST-SW-02
 switchport mode trunk
 switchport trunk allowed vlan 10,20
 switchport trunk native vlan 99
 channel-group 10 mode passive
 no shutdown
!
interface Port-channel10
 description UPLINK-VPC-LACP-TO-DISTRIBUTION
 switchport mode trunk
 switchport trunk allowed vlan 10,20
 switchport trunk native vlan 99
 no shutdown
!
! ── VLAN 10 — Linux Web Servers (RHEL 8 / Ubuntu 22.04) ──────────────────
!
interface GigabitEthernet1/0/1
 description WEB-SRV-01-RHEL8-10.0.0.40
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 ip dhcp snooping limit rate 100
 no shutdown
!
interface GigabitEthernet1/0/2
 description WEB-SRV-02-RHEL8-10.0.0.41
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 ip dhcp snooping limit rate 100
 no shutdown
!
interface GigabitEthernet1/0/3
 description WEB-SRV-03-UBUNTU2204-10.0.0.42
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 ip dhcp snooping limit rate 100
 no shutdown
!
interface GigabitEthernet1/0/4
 description SPARE-VLAN10
 switchport mode access
 switchport access vlan 10
 shutdown
!
! ── VLAN 20 — Windows + Linux App/DB Servers ─────────────────────────────
!
interface GigabitEthernet1/0/9
 description FILE-SRV-01-WIN2022-10.0.0.70
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 ip dhcp snooping limit rate 100
 no shutdown
!
interface GigabitEthernet1/0/10
 description EXCHANGE-01-WIN2022-10.0.0.71
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 ip dhcp snooping limit rate 100
 no shutdown
!
interface GigabitEthernet1/0/11
 description SQL-SRV-01-WIN2022-10.0.0.85
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 ip dhcp snooping limit rate 100
 no shutdown
!
interface GigabitEthernet1/0/12
 description DB-SRV-01-UBUNTU2204-10.0.0.86
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 ip dhcp snooping limit rate 100
 no shutdown
!
interface GigabitEthernet1/0/13
 description DB-SRV-02-UBUNTU2204-10.0.0.87
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 ip dhcp snooping limit rate 100
 no shutdown
!
! ── OOB Management SVI ────────────────────────────────────────────────────
!
interface Vlan30
 description MANAGEMENT-VLAN-SWITCH-MGMT
 ip address 10.0.0.110 255.255.255.224
 no shutdown
!
ip default-gateway 10.0.0.97
!
! ── DHCP snooping ─────────────────────────────────────────────────────────
!
ip dhcp snooping
ip dhcp snooping vlan 10,20
no ip dhcp snooping information option
!
! ── Services ──────────────────────────────────────────────────────────────
!
ntp server 10.0.0.104
snmp-server community corp-ro RO
snmp-server host 10.0.0.103 version 2c corp-ro
logging host 10.0.0.103
!
ip ssh version 2
!
line con 0
 logging synchronous
line vty 0 4
 transport input ssh
 access-class VTY-ACCESS in
!
ip access-list standard VTY-ACCESS
 10 permit 10.0.0.96 0.0.0.31
 20 deny   any log
!
end
