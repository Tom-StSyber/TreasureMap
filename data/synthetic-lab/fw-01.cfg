version 17.03.03
!
! Cisco IOS XE Software, ASR1001-X — Perimeter Firewall
! Generated: synthetic-lab / corp.local
!
hostname fw-01
!
ip domain-name corp.local
!
enable secret 9 $9$synthlab$hashonly
!
aaa new-model
aaa authentication login default local
!
username admin privilege 15 secret 9 $9$synthlab$hashonly
!
! ── Interfaces ────────────────────────────────────────────────────────────
!
interface Loopback0
 description Router-ID-and-Mgmt
 ip address 10.0.0.200 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0/0
 description INTERNET-UPLINK-ISP1
 ip address 203.0.113.2 255.255.255.252
 ip access-group OUTSIDE-IN in
 no shutdown
!
interface GigabitEthernet0/0/1
 description LINK-TO-CORP-RTR-01
 ip address 10.0.0.1 255.255.255.252
 ip access-group INBOUND-CORP in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0spfK3y!
 no shutdown
!
interface GigabitEthernet0/0/2
 description LINK-TO-CORP-RTR-02
 ip address 10.0.0.5 255.255.255.252
 ip access-group INBOUND-CORP in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0spfK3y!
 no shutdown
!
! ── ACLs ──────────────────────────────────────────────────────────────────
!
ip access-list extended OUTSIDE-IN
 10 permit tcp any any eq 443
 20 permit tcp any any eq 80
 30 permit tcp any any eq 25
 40 permit icmp any any echo-reply
 50 permit tcp any any established
 60 deny   ip 10.0.0.0 0.255.255.255 any log
 70 deny   ip 172.16.0.0 0.15.255.255 any log
 80 deny   ip 192.168.0.0 0.0.255.255 any log
 90 deny   ip any any log
!
ip access-list extended INBOUND-CORP
 10 permit ospf any any
 20 permit tcp any any eq 179
 30 permit ip any any
!
! ── OSPF ──────────────────────────────────────────────────────────────────
!
router ospf 1
 router-id 10.0.0.200
 auto-cost reference-bandwidth 100000
 network 10.0.0.0 0.0.0.3 area 0
 network 10.0.0.4 0.0.0.3 area 0
 network 10.0.0.200 0.0.0.0 area 0
 default-information originate always
!
! ── BGP ───────────────────────────────────────────────────────────────────
!
router bgp 65000
 bgp router-id 10.0.0.200
 bgp log-neighbor-changes
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.2 description eBGP-TO-CORP-RTR-01
 neighbor 10.0.0.2 update-source GigabitEthernet0/0/1
 neighbor 10.0.0.6 remote-as 65001
 neighbor 10.0.0.6 description eBGP-TO-CORP-RTR-02
 neighbor 10.0.0.6 update-source GigabitEthernet0/0/2
 !
 address-family ipv4
  network 203.0.113.0 mask 255.255.255.252
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 default-originate
  neighbor 10.0.0.6 activate
  neighbor 10.0.0.6 default-originate
 exit-address-family
!
! ── NAT ───────────────────────────────────────────────────────────────────
!
ip nat inside source list NAT-INSIDE interface GigabitEthernet0/0/0 overload
!
ip access-list standard NAT-INSIDE
 10 permit 10.0.0.0 0.0.0.255
!
! ── Services ──────────────────────────────────────────────────────────────
!
ntp server 10.0.0.104
ntp server 203.0.113.1 prefer
snmp-server community corp-ro RO
snmp-server host 10.0.0.103 version 2c corp-ro
logging host 10.0.0.103
logging trap informational
!
ip ssh version 2
ip ssh time-out 60
!
line con 0
 logging synchronous
line vty 0 4
 transport input ssh
 access-class VTY-ACCESS in
!
ip access-list standard VTY-ACCESS
 10 permit 10.0.0.96 0.0.0.31
 20 deny   any log
!
end
