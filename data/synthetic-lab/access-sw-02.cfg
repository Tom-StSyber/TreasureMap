version 17.09.04a
!
! Cisco IOS Software, Catalyst 9300-48P — Workstation Access Switch
! hostname: access-sw-02
!
hostname access-sw-02
!
ip domain-name corp.local
!
enable secret 9 $9$synthlab$hashonly
!
aaa new-model
aaa authentication login default local
!
username admin privilege 15 secret 9 $9$synthlab$hashonly
!
spanning-tree mode rapid-pvst
spanning-tree extend system-id
spanning-tree portfast default
spanning-tree portfast bpduguard default
!
! ── Uplink trunks to distribution (LACP) ──────────────────────────────────
!
interface GigabitEthernet1/1/1
 description UPLINK-LACP-TO-DIST-SW-01
 switchport mode trunk
 switchport trunk allowed vlan 40,50
 switchport trunk native vlan 99
 channel-group 20 mode active
 no shutdown
!
interface GigabitEthernet1/1/2
 description UPLINK-LACP-TO-DIST-SW-02
 switchport mode trunk
 switchport trunk allowed vlan 40,50
 switchport trunk native vlan 99
 channel-group 20 mode passive
 no shutdown
!
interface Port-channel20
 description UPLINK-VPC-LACP-TO-DISTRIBUTION
 switchport mode trunk
 switchport trunk allowed vlan 40,50
 switchport trunk native vlan 99
 no shutdown
!
! ── VLAN 40 — Windows 10/11 Workstations (domain-joined to corp.local) ───
!
interface GigabitEthernet1/0/1
 description WS-ADMIN-01-WIN11PRO-10.0.0.135
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
interface GigabitEthernet1/0/2
 description WS-ADMIN-02-WIN11PRO-10.0.0.136
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
interface GigabitEthernet1/0/3
 description WS-USER-01-WIN10ENT-DHCP
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
interface GigabitEthernet1/0/4
 description WS-USER-02-WIN10ENT-DHCP
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
interface GigabitEthernet1/0/5
 description WS-USER-03-WIN10ENT-DHCP
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
interface GigabitEthernet1/0/6
 description WS-USER-04-WIN10ENT-DHCP
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
interface GigabitEthernet1/0/7
 description WS-USER-05-WIN11ENT-DHCP
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
interface GigabitEthernet1/0/8
 description WS-USER-06-WIN11ENT-DHCP
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
interface GigabitEthernet1/0/9
 description WS-USER-07-WIN10ENT-DHCP
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
interface GigabitEthernet1/0/10
 description WS-USER-08-WIN10ENT-DHCP
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast
 ip dhcp snooping limit rate 15
 no shutdown
!
! ── VLAN 50 — Guest WiFi APs ──────────────────────────────────────────────
!
interface GigabitEthernet1/0/41
 description AP-LOBBY-GUEST-WIFI
 switchport mode access
 switchport access vlan 50
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet1/0/42
 description AP-CONF-ROOM-GUEST-WIFI
 switchport mode access
 switchport access vlan 50
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet1/0/43
 description AP-CAFETERIA-GUEST-WIFI
 switchport mode access
 switchport access vlan 50
 spanning-tree portfast
 no shutdown
!
! ── Management SVI ────────────────────────────────────────────────────────
!
interface Vlan30
 description MANAGEMENT-VLAN-SWITCH-MGMT
 ip address 10.0.0.111 255.255.255.224
 no shutdown
!
ip default-gateway 10.0.0.97
!
! ── Dynamic ARP Inspection ────────────────────────────────────────────────
!
ip arp inspection vlan 40,50
ip arp inspection validate src-mac dst-mac ip
!
ip dhcp snooping
ip dhcp snooping vlan 40,50
no ip dhcp snooping information option
!
! ── 802.1X (Windows NPS / Radius for domain workstations) ────────────────
!
dot1x system-auth-control
!
! ── Services ──────────────────────────────────────────────────────────────
!
ntp server 10.0.0.104
snmp-server community corp-ro RO
snmp-server host 10.0.0.103 version 2c corp-ro
logging host 10.0.0.103
!
ip ssh version 2
!
radius server WINDOWS-NPS
 address ipv4 10.0.0.100 auth-port 1812 acct-port 1813
 key Corp@Rad1us!
!
line con 0
 logging synchronous
line vty 0 4
 transport input ssh
 access-class VTY-ACCESS in
!
ip access-list standard VTY-ACCESS
 10 permit 10.0.0.96 0.0.0.31
 20 deny   any log
!
end
