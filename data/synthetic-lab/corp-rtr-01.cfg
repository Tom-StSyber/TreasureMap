version 17.06.01a
!
! Cisco IOS XE Software, ISR4451 — Core Router A
! hostname: corp-rtr-01
!
hostname corp-rtr-01
!
ip domain-name corp.local
!
enable secret 9 $9$synthlab$hashonly
!
aaa new-model
aaa authentication login default local
!
username admin privilege 15 secret 9 $9$synthlab$hashonly
!
! ── Interfaces ────────────────────────────────────────────────────────────
!
interface Loopback0
 description Router-ID-BGP-iBGP-source
 ip address 10.0.0.201 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0/0
 description LINK-TO-FW-01
 ip address 10.0.0.2 255.255.255.252
 ip access-group FIREWALL-INBOUND in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0spfK3y!
 no shutdown
!
interface GigabitEthernet0/0/1
 description LINK-TO-DIST-SW-01
 ip address 10.0.0.9 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0spfK3y!
 no shutdown
!
interface GigabitEthernet0/0/2
 description LINK-TO-DIST-SW-02
 ip address 10.0.0.13 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0spfK3y!
 no shutdown
!
interface GigabitEthernet0/0/3
 description IBGP-TIE-LINE-TO-CORP-RTR-02
 ip address 10.0.0.25 255.255.255.252
 no shutdown
!
! ── ACLs ──────────────────────────────────────────────────────────────────
!
ip access-list extended FIREWALL-INBOUND
 10 permit ospf any any
 20 permit tcp any any eq 179
 30 permit tcp any any established
 40 permit icmp any any echo-reply
 50 permit ip any 10.0.0.0 0.0.0.255
 60 deny   ip any any log
!
ip access-list extended CORP-TO-INTERNET
 10 permit ip 10.0.0.0 0.0.0.255 any
 20 deny   ip any any log
!
! ── DHCP pools (serves Windows/Linux hosts on each VLAN) ─────────────────
!
ip dhcp excluded-address 10.0.0.33 10.0.0.49
ip dhcp excluded-address 10.0.0.65 10.0.0.79
ip dhcp excluded-address 10.0.0.97 10.0.0.119
ip dhcp excluded-address 10.0.0.129 10.0.0.144
ip dhcp excluded-address 10.0.0.161 10.0.0.169
!
ip dhcp pool VLAN10-WEB
 network 10.0.0.32 255.255.255.224
 default-router 10.0.0.33
 dns-server 10.0.0.100 10.0.0.101
 domain-name corp.local
 lease 1
!
ip dhcp pool VLAN20-APP
 network 10.0.0.64 255.255.255.224
 default-router 10.0.0.65
 dns-server 10.0.0.100 10.0.0.101
 domain-name corp.local
 lease 1
!
ip dhcp pool VLAN30-MGMT
 network 10.0.0.96 255.255.255.224
 default-router 10.0.0.97
 dns-server 10.0.0.100 10.0.0.101
 domain-name corp.local
 lease 8
!
ip dhcp pool VLAN40-WORKSTATIONS
 network 10.0.0.128 255.255.255.224
 default-router 10.0.0.129
 dns-server 10.0.0.100 10.0.0.101
 domain-name corp.local
 lease 7
!
ip dhcp pool VLAN50-GUEST
 network 10.0.0.160 255.255.255.224
 default-router 10.0.0.161
 dns-server 8.8.8.8 8.8.4.4
 lease 1
!
! ── OSPF ──────────────────────────────────────────────────────────────────
!
router ospf 1
 router-id 10.0.0.201
 auto-cost reference-bandwidth 100000
 network 10.0.0.0 0.0.0.3 area 0
 network 10.0.0.8 0.0.0.3 area 0
 network 10.0.0.12 0.0.0.3 area 0
 network 10.0.0.24 0.0.0.3 area 0
 network 10.0.0.201 0.0.0.0 area 0
!
! ── BGP ───────────────────────────────────────────────────────────────────
!
router bgp 65001
 bgp router-id 10.0.0.201
 bgp log-neighbor-changes
 neighbor 10.0.0.1 remote-as 65000
 neighbor 10.0.0.1 description eBGP-TO-FW-01
 neighbor 10.0.0.202 remote-as 65001
 neighbor 10.0.0.202 description iBGP-TO-CORP-RTR-02
 neighbor 10.0.0.202 update-source Loopback0
 neighbor 10.0.0.202 next-hop-self
 !
 address-family ipv4
  network 10.0.0.0 mask 255.255.255.0
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.202 activate
 exit-address-family
!
! ── Services ──────────────────────────────────────────────────────────────
!
ntp server 10.0.0.104
snmp-server community corp-ro RO
snmp-server host 10.0.0.103 version 2c corp-ro
logging host 10.0.0.103
!
ip ssh version 2
!
line con 0
 logging synchronous
line vty 0 4
 transport input ssh
 access-class VTY-ACCESS in
!
ip access-list standard VTY-ACCESS
 10 permit 10.0.0.96 0.0.0.31
 20 deny   any log
!
end
