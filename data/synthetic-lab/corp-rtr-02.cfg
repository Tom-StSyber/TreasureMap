version 17.06.01a
!
! Cisco IOS XE Software, ISR4451 — Core Router B
! hostname: corp-rtr-02
!
hostname corp-rtr-02
!
ip domain-name corp.local
!
enable secret 9 $9$synthlab$hashonly
!
aaa new-model
aaa authentication login default local
!
username admin privilege 15 secret 9 $9$synthlab$hashonly
!
! ── Interfaces ────────────────────────────────────────────────────────────
!
interface Loopback0
 description Router-ID-BGP-iBGP-source
 ip address 10.0.0.202 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0/0
 description LINK-TO-FW-01
 ip address 10.0.0.6 255.255.255.252
 ip access-group FIREWALL-INBOUND in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0spfK3y!
 no shutdown
!
interface GigabitEthernet0/0/1
 description LINK-TO-DIST-SW-01
 ip address 10.0.0.17 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0spfK3y!
 no shutdown
!
interface GigabitEthernet0/0/2
 description LINK-TO-DIST-SW-02
 ip address 10.0.0.21 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 0spfK3y!
 no shutdown
!
interface GigabitEthernet0/0/3
 description IBGP-TIE-LINE-TO-CORP-RTR-01
 ip address 10.0.0.26 255.255.255.252
 no shutdown
!
! ── ACLs ──────────────────────────────────────────────────────────────────
!
ip access-list extended FIREWALL-INBOUND
 10 permit ospf any any
 20 permit tcp any any eq 179
 30 permit tcp any any established
 40 permit icmp any any echo-reply
 50 permit ip any 10.0.0.0 0.0.0.255
 60 deny   ip any any log
!
! ── OSPF ──────────────────────────────────────────────────────────────────
!
router ospf 1
 router-id 10.0.0.202
 auto-cost reference-bandwidth 100000
 network 10.0.0.4 0.0.0.3 area 0
 network 10.0.0.16 0.0.0.3 area 0
 network 10.0.0.20 0.0.0.3 area 0
 network 10.0.0.24 0.0.0.3 area 0
 network 10.0.0.202 0.0.0.0 area 0
!
! ── BGP ───────────────────────────────────────────────────────────────────
!
router bgp 65001
 bgp router-id 10.0.0.202
 bgp log-neighbor-changes
 neighbor 10.0.0.5 remote-as 65000
 neighbor 10.0.0.5 description eBGP-TO-FW-01
 neighbor 10.0.0.201 remote-as 65001
 neighbor 10.0.0.201 description iBGP-TO-CORP-RTR-01
 neighbor 10.0.0.201 update-source Loopback0
 neighbor 10.0.0.201 next-hop-self
 !
 address-family ipv4
  network 10.0.0.0 mask 255.255.255.0
  neighbor 10.0.0.5 activate
  neighbor 10.0.0.201 activate
 exit-address-family
!
! ── Services ──────────────────────────────────────────────────────────────
!
ntp server 10.0.0.104
snmp-server community corp-ro RO
snmp-server host 10.0.0.103 version 2c corp-ro
logging host 10.0.0.103
!
ip ssh version 2
!
line con 0
 logging synchronous
line vty 0 4
 transport input ssh
 access-class VTY-ACCESS in
!
ip access-list standard VTY-ACCESS
 10 permit 10.0.0.96 0.0.0.31
 20 deny   any log
!
end
