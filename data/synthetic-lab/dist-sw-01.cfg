  ip ospf message-digest-key 1 md5 0spfK3y!
  ip router ospf 1 area 0.0.0.0
  no shutdown
!
interface Ethernet1/2
  description UPLINK-TO-CORP-RTR-02
  no switchport
  ip address 10.0.0.18 255.255.255.252
