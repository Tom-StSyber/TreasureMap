!Command: show running-config
!Running configuration last done at: Sun Jun 14 00:00:01 2026

version 10.2(5)M
boot nxos bootflash:///nxos64-cs.10.2.5.M.bin
!
hostname dist-sw-01
!
feature ospf
feature bgp
feature hsrp
feature lacp
feature vpc
feature lldp
!
username admin password 5 $5$synthlab$hashonly role network-admin
!
! ── VLANs ─────────────────────────────────────────────────────────────────
!
vlan 1
  name DEFAULT-NATIVE
vlan 10
  name WEB-SERVERS-LINUX
vlan 20
  name APP-DB-SERVERS
vlan 30
  name MANAGEMENT-WINDOWS
vlan 40
  name WORKSTATIONS-WINDOWS
vlan 50
  name GUEST-WIFI
vlan 99
  name OOB-MANAGEMENT
!
spanning-tree mode rapid-pvst
spanning-tree vlan 10,20,30,40,50,99 priority 4096
!
! ── VPC domain ────────────────────────────────────────────────────────────
!
vpc domain 1
