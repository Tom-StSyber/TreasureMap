# TreasureMap — Docker Compose
# Install location: D:\Home-Lab\TreasureMap
# Run from that directory: docker compose up -d --build
version: "3.8"

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: tm-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # no auth during dev
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      # Bound to loopback only — reachable from the host and from other
      # containers (via the compose network name "elasticsearch:9200"),
      # but NOT from other machines on the LAN. Security is disabled during
      # testing, so this binding is the control that prevents unauthenticated
      # remote read/delete of the datastore.
      - "127.0.0.1:9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: tm-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      # Loopback only — access Kibana from the host directly, or via an
      # SSH tunnel from another machine. Not exposed to the LAN.
      - "127.0.0.1:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tm-api
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    # NOTE: the source bind-mount (./backend:/app) was removed — it let anything
    # that could write the host dir change running server code, and only existed
    # to support --reload (also removed). For hot-reload dev, run uvicorn from the
    # host venv per INSTALL.md, or use a docker-compose.override.yml. See M-1.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tm-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  esdata:
